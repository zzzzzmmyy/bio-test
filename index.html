
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测测你是那种细菌or真菌</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 开始页面 -->
  <div id="start-page" class="container">
    <h1 class="title">测一测你是什么类型的细菌or真菌</h1>
    <div class="card start-card">
      <p class="intro">通过简单的10道题目，探索你的微生物人格类型！</p>
      <button onclick="startTest()" class="start-btn">开始测试</button>
    </div>
  </div>

  <!-- 测试页面 -->
  <div id="test-page" class="container" style="display: none;">
    <div class="card">
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="questions-container"></div>
      <button onclick="calculateResult()" class="submit-btn">查看结果</button>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
